name: primeiro-workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  primeiro-job:
    name: "Meu primeiro job"
    runs-on: ubuntu-latest
    steps:
      - name: "Minha primeira ação"
        run: echo "Deus seja louvado sempre pela oportunidade"
      - name: "Minha segunda ação"
        run: echo "Hello World !🚀"
      - name: "Minha terceira ação"
        run: |
          echo "Você criou seu primeiro workflow com a segunda ação"
          echo "Congratulations sir"
  segundo-job:
    name: "script-python"
    runs-on: ubuntu-latest
    needs: [primeiro-job]
    steps:
      - name: "Script Python"
        run: |
          variavel = "Hello World ! "
          print(variavel)
        shell: python
  terceiro-job:
    name: "instalando environment nodeJS"
    runs-on: ubuntu-latest
    needs: [segundo-job]
    steps:
      - name: "Verificação da versão atual do nodeJS"
        run: node --version
      - name: "Instalando e definindo nova versão v24.16.0"
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
      - name: "Verificação da versão atual do nodeJS pós mudança"
        run: node --version
